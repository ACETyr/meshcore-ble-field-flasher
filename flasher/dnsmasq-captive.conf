# Captive portal for the field AP. NetworkManager's shared-mode dnsmasq reads this dir
# (/etc/NetworkManager/dnsmasq-shared.d/). Wildcard-resolve EVERY domain to the Pi's AP address so a
# phone's connectivity-check (captive.apple.com, connectivitycheck.gstatic.com, ...) lands on the web UI
# → the phone auto-pops the flasher page. Only applies to the AP (shared) connection, not home-WiFi client.
